<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f4f6f9;
}

.header{
background:#1e3a8a;
color:#fff;
padding:18px;
font-size:22px;
font-weight:bold;
text-align:center;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
gap:20px;
padding:20px;
}

.card{
background:#fff;
padding:25px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,.1);
text-align:center;
cursor:pointer;
transition:.3s;
}

.card:hover{
transform:translateY(-5px);
}

.card h2{
font-size:40px;
margin-bottom:10px;
}

.card p{
font-size:18px;
font-weight:bold;
color:#555;
}

.logout{
position:fixed;
bottom:20px;
right:20px;
background:#ef4444;
color:white;
padding:12px 18px;
border-radius:10px;
text-decoration:none;
font-weight:bold;
}
</style>

</head>
<body>

<div class="header">
Worker Management System
</div>

<div class="grid">

<div class="card" onclick="location='workers.html'">
<h2>👷</h2>
<p>Workers</p>
</div>

<div class="card" onclick="location='site.html'">
<h2>🏗️</h2>
<p>Sites</p>
</div>

<div class="card" onclick="location='attendance.html'">
<h2>📅</h2>
<p>Attendance</p>
</div>

<div class="card">
<h2>💰</h2>
<p>Salary</p>
</div>

<div class="card">
<h2>📊</h2>
<p>Reports</p>
</div>

<div class="card">
<h2>⚙️</h2>
<p>Settings</p>
</div>

</div>

<a href="index.html" class="logout">Logout</a>

</body>
</html>
